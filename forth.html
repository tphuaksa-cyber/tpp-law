<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forth - กระดานฝากข้อความ (Auth) | TPP LAW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .navy-bg { background-color: #0A192F; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #D4AF37;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <!-- Login Overlay (Regular User: 1234) -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[2000] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="mb-6">
                <div class="w-16 h-16 navy-bg rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-2xl gold-text"></i>
                </div>
                <h2 class="text-2xl font-bold navy-text">กรุณาใส่รหัสผ่าน</h2>
                <p class="text-slate-500 text-sm mt-2">เพื่อเข้าสู่หน้ากระดานฝากข้อความ</p>
            </div>
            <input type="password" id="password-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 mb-4 text-center text-2xl tracking-[0.5em] focus:ring-2 focus:ring-amber-500 outline-none" placeholder="****">
            <button onclick="checkUserPassword()" class="w-full gold-bg text-slate-900 font-bold py-3 rounded-xl hover:bg-amber-500 transition shadow-lg mb-4">เข้าใช้งานทั่วไป</button>
            <button onclick="toggleAdminLogin(true)" class="text-slate-400 text-xs hover:text-slate-600 transition underline">เข้าสู่ระบบ Admin</button>
            <p id="error-msg" class="text-red-500 text-sm mt-4 hidden">รหัสผ่านไม่ถูกต้อง</p>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div id="admin-modal" class="fixed inset-0 bg-black/50 z-[3000] flex items-center justify-center p-6 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full">
            <h3 class="text-xl font-bold navy-text mb-4">Admin Login</h3>
            <div class="space-y-4">
                <input type="email" id="admin-email" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none" placeholder="Email" value="tphuaksa@gmail.com">
                <input type="password" id="admin-password" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none" placeholder="Password">
                <button onclick="handleAdminLogin()" id="btn-admin-login" class="w-full navy-bg text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition">ล็อกอินแอดมิน</button>
                <button onclick="toggleAdminLogin(false)" class="w-full text-slate-500 text-sm py-2">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <nav class="navy-bg text-white py-4 shadow-lg">
            <div class="container mx-auto px-6 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <span class="text-xl font-bold">TPP <span class="gold-text">FORTH</span></span>
                    <span id="admin-badge" class="hidden bg-red-500 text-[10px] px-2 py-1 rounded ml-2 uppercase font-bold">Admin</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="btn-logout" onclick="handleLogout()" class="hidden text-xs text-red-300 hover:text-red-500 transition">Logout Admin</button>
                    <a href="index.html" class="text-sm hover:text-amber-400 transition">กลับหน้าหลัก</a>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-12 max-w-2xl">
            <div class="bg-white rounded-3xl shadow-xl p-8 mb-8 border border-slate-100">
                <h1 class="text-3xl font-bold navy-text mb-6">ฝากข้อความ</h1>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ชื่อของคุณ</label>
                        <input type="text" id="user-name" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none" placeholder="ระบุชื่อ...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">ข้อความ</label>
                        <textarea id="user-msg" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-amber-500 outline-none" placeholder="พิมพ์ข้อความที่นี่..."></textarea>
                    </div>
                    <button id="btn-post" onclick="postMessage()" class="w-full navy-bg text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition shadow-xl flex items-center justify-center">
                        <i class="fas fa-paper-plane mr-2"></i> ส่งข้อความ
                    </button>
                </div>
            </div>

            <div id="loading-spinner" class="flex justify-center py-8"><div class="loader"></div></div>
            <div id="message-list" class="space-y-4"></div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNfkNuiHP6IWnBWhjgrO5Cr1ogqr5vORc",
            authDomain: "tpp-law.firebaseapp.com",
            databaseURL: "https://tpp-law-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tpp-law",
            storageBucket: "tpp-law.firebasestorage.app",
            messagingSenderId: "964367025099",
            appId: "1:964367025099:web:01dccb5abbd48b0fec2c4e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        const USER_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; // 1234

        // Listen for Auth changes
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('btn-logout').classList.remove('hidden');
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('admin-modal').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadMessages();
            } else {
                document.getElementById('admin-badge').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
            }
        });

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        window.checkUserPassword = async function() {
            const input = document.getElementById('password-input').value;
            const inputHash = await hashPassword(input);
            if (inputHash === USER_HASH) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                loadMessages();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        };

        window.toggleAdminLogin = function(show) {
            document.getElementById('admin-modal').classList.toggle('hidden', !show);
        };

        window.handleAdminLogin = function() {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            const btn = document.getElementById('btn-admin-login');
            btn.disabled = true;
            btn.innerText = "กำลังเข้าสู่ระบบ...";

            signInWithEmailAndPassword(auth, email, pass)
                .catch(err => {
                    alert('ล็อกอินไม่สำเร็จ: ' + err.message);
                    btn.disabled = false;
                    btn.innerText = "ล็อกอินแอดมิน";
                });
        };

        window.handleLogout = function() {
            signOut(auth).then(() => location.reload());
        };

        window.postMessage = function() {
            const name = document.getElementById('user-name').value.trim();
            const msg = document.getElementById('user-msg').value.trim();
            if (!name || !msg) return alert('กรุณากรอกให้ครบ');

            push(ref(db, 'messages'), {
                name: name,
                text: msg,
                date: new Date().toLocaleString('th-TH'),
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('user-name').value = '';
                document.getElementById('user-msg').value = '';
            });
        };

        window.deleteMessage = function(id) {
            if (!confirm('ยืนยันการลบ?')) return;
            remove(ref(db, 'messages/' + id)).catch(err => alert('ไม่มีสิทธิ์ลบ: ' + err.message));
        };

        function loadMessages() {
            onValue(ref(db, 'messages'), (snapshot) => {
                const data = snapshot.val();
                const messages = [];
                for (let id in data) { messages.unshift({ id, ...data[id] }); }
                messages.sort((a, b) => b.timestamp - a.timestamp);
                renderMessages(messages);
                document.getElementById('loading-spinner').classList.add('hidden');
            });
        }

        function renderMessages(messages) {
            const list = document.getElementById('message-list');
            list.innerHTML = messages.map(m => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold navy-text">${escapeHtml(m.name)}</h4>
                        <div class="flex items-center space-x-3">
                            <span class="text-[10px] text-slate-400">${m.date}</span>
                            ${currentUser ? `<button onclick="deleteMessage('${m.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash-alt"></i></button>` : ''}
                        </div>
                    </div>
                    <p class="text-slate-600 sarabun leading-relaxed">${escapeHtml(m.text)}</p>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') window.checkUserPassword(); });
    </script>
</body>
</html>
